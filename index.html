<!-- 1. Подключаем библиотеку ПЕРВОЙ -->
<script type="text/javascript" src="https://cdn.jsdelivr.net"></script>

<script type="text/javascript">
  // Эта функция сработает только тогда, когда ВСЁ (включая библиотеку) загрузится
  window.onload = function() {
    
    // Проверяем, появилась ли переменная emailjs
    if (typeof emailjs !== 'undefined') {
      
      emailjs.init({
        publicKey: "HtYE1Fe2UojNHBMOo",
      });

      const btn = document.getElementById('button');
      const form = document.getElementById('form');

      if (form) {
        form.addEventListener('submit', function(event) {
          event.preventDefault();
          if (btn) btn.value = 'Отправка...';

          emailjs.sendForm('service_7awq98i', 'template_uf52wx1', this)
            .then(() => {
              if (btn) btn.value = 'Отправлено!';
              alert('Успех!');
            }, (err) => {
              if (btn) btn.value = 'Ошибка';
              alert('Ошибка: ' + JSON.stringify(err));
            });
        });
      }
    } else {
      // Если библиотека всё еще не видна (например, AdBlock заблокировал)
      console.error("EmailJS не загрузился. Проверьте подключение к интернету или AdBlock.");
      alert("AdBlock или wtf what is this за херня новый инет сначалу купи и потом заходи на сайт бомж .");
    }
  };
</script>
